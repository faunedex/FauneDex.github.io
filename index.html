<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FauneDex — Côte-d'Or</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-muted: #666;
    --text-hint: #999;
    --radius: 12px;
    --radius-sm: 8px;
    --progress-bg: #e0e0e0;
  }
  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1c1c1a;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text-muted: #9a9691;
    --text-hint: #666360;
    --progress-bg: #2a2a28;
    --green-light: #0d2e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky; top: 0; z-index: 50;
    transition: background .2s;
  }
  .header-inner { max-width: 940px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .app-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .stat-pill { background: var(--bg); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; color: var(--text-muted); }
  .stat-pill b { color: var(--text); }
  .theme-btn {
    background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; cursor: pointer; color: var(--text-muted);
    transition: all .15s; white-space: nowrap;
  }
  .theme-btn:hover { background: var(--border); }

  /* PROGRESS */
  .progress-wrap { max-width: 940px; margin: 0 auto; padding: 0.75rem 1.5rem 0; }
  .progress-bar { height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s ease; }

  /* MAIN */
  .main { max-width: 940px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }

  /* FILTERS */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }

  /* SAISON */
  .season-section {
    background: linear-gradient(135deg, #FFF8E6 0%, var(--surface) 60%); border: 0.5px solid #F0D98C;
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.25rem;
  }
  [data-theme="dark"] .season-section { background: linear-gradient(135deg, #2a2410 0%, var(--surface) 60%); border-color: #5c4f1a; }
  .season-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .season-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .season-title select {
    border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 3px 8px; font-size: 14px;
    font-weight: 600; background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer;
  }
  .season-today-btn {
    font-size: 12px; color: var(--text-muted); background: var(--surface); border: 0.5px solid var(--border-strong);
    border-radius: 20px; padding: 4px 12px; cursor: pointer; transition: all .15s;
  }
  .season-today-btn:hover { background: var(--bg); }
  .season-today-btn.is-current { display: none; }
  .season-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .season-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 10px 0; grid-column: 1/-1; }
  .season-card-mini {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
    padding: 8px; cursor: pointer; transition: all .15s; text-align: center; position: relative;
  }
  .season-card-mini:hover { border-color: #F0D98C; transform: translateY(-1px); }
  .season-card-mini .emoji { font-size: 26px; display: block; }
  .season-card-mini .name { font-size: 10px; color: var(--text); margin-top: 4px; line-height: 1.2; }
  .season-badge {
    font-size: 11px; line-height: 1; margin-left: 4px; vertical-align: 1px;
  }
  .search-input {
    padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--border-strong);
    background: var(--surface); color: var(--text); font-size: 13px; min-width: 160px; flex: 1; max-width: 240px;
    transition: background .2s, color .2s;
  }
  .search-input:focus { outline: none; border-color: var(--green); }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border-strong);
    background: transparent; font-size: 13px; cursor: pointer; color: var(--text-muted);
    transition: all .15s; white-space: nowrap;
  }
  .filter-btn:hover { background: var(--bg); }
  .filter-btn.active { background: #E6F1FB; border-color: #378ADD; color: #185FA5; }
  [data-theme="dark"] .filter-btn.active { background: #0c2340; border-color: #378ADD; color: #85b7eb; }
  .filter-btn.active-cap { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
  [data-theme="dark"] .filter-btn.active-cap { color: #5dcaa5; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }

  /* CARD */
  .card {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 10px; cursor: pointer; transition: all .15s; position: relative; user-select: none;
  }
  .card:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .card.captured { border-color: var(--green); }
  [data-theme="light"] .card.captured { background: linear-gradient(145deg, #f0fdf8 0%, #fff 70%); }
  [data-theme="dark"] .card.captured { background: linear-gradient(145deg, #0b2018 0%, var(--surface) 70%); }
  .card-num { font-size: 10px; color: var(--text-hint); margin-bottom: 4px; letter-spacing: .5px; }
  .card-img {
    width: 100%; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; margin-bottom: 8px; overflow: hidden; background: var(--bg);
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .card-emoji { font-size: 38px; line-height: 1; }
  .card-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-type { font-size: 10px; color: var(--text-hint); margin-top: 2px; }
  .card-date { font-size: 10px; color: var(--green); margin-top: 4px; font-weight: 500; }
  .cap-dot {
    position: absolute; top: 7px; right: 7px; width: 14px; height: 14px;
    background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .cap-dot::after { content:''; display:block; width:5px; height:5px; background:white; border-radius:50%; }
  .first-badge {
    position: absolute; top: 5px; right: 25px; font-size: 13px; line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.25));
  }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; }
  .empty-icon { font-size: 40px; display: block; margin-bottom: 10px; }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
    align-items: center; justify-content: center; z-index: 200; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border);
    padding: 1.5rem; max-width: 380px; width: 100%; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.2); transition: background .2s;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .modal-num { font-size: 11px; color: var(--text-hint); letter-spacing: .5px; }
  .modal-name { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .modal-latin { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 2px; }
  .modal-close {
    background: none; border: 0.5px solid var(--border-strong); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; font-size: 18px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .modal-close:hover { background: var(--bg); }
  .modal-img {
    width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-sm);
    margin-bottom: 1rem; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 56px;
    overflow: hidden;
  }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .edit-photo-btn {
    position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px;
    background: rgba(0,0,0,.55); border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 15px; cursor: pointer; transition: background .15s;
  }
  .edit-photo-btn:hover { background: rgba(0,0,0,.75); }
  .type-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-weight: 500; margin-bottom: 10px;
  }
  .modal-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }
  .modal-habitat { font-size: 12px; color: var(--text-hint); margin-bottom: 1rem; }
  .modal-habitat::before { content: '📍 '; }
  .capture-section { border-top: 0.5px solid var(--border); padding-top: 1rem; }
  .capture-title { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; font-weight: 500; }
  .capture-done { font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 10px; }
  .photo-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .photo-label {
    flex: 1; padding: 7px 10px; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm);
    font-size: 12px; color: var(--text-muted); cursor: pointer; text-align: center; transition: all .15s;
  }
  .photo-label:hover { background: var(--bg); border-color: var(--green); color: var(--green-dark); }
  .photo-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 0.5px solid var(--border); }
  .photo-placeholder {
    width: 50px; height: 50px; border-radius: 8px; background: var(--bg);
    border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .input-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .input-row input, .notes-input {
    flex: 1; padding: 6px 8px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong);
    background: var(--bg); color: var(--text); font-size: 12px; font-family: inherit;
    transition: background .2s, color .2s;
  }
  .notes-input { width: 100%; margin-bottom: 10px; }
  .input-row input:focus, .notes-input:focus { outline: none; border-color: var(--green); }
  .btn-capture {
    width: 100%; padding: 9px; border-radius: var(--radius-sm); border: none;
    background: var(--green); color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .btn-capture:hover { background: var(--green-dark); }
  .btn-release {
    width: 100%; padding: 7px; border-radius: var(--radius-sm);
    border: 0.5px solid #E24B4A; background: transparent; color: #E24B4A;
    font-size: 12px; cursor: pointer; margin-top: 8px; transition: all .15s;
  }
  .btn-release:hover { background: rgba(226,75,74,.08); }

  /* TYPE badge colors — works in both light & dark */
  .t-mammifere { background: #FAECE7; color: #993C1D; }
  .t-oiseau { background: #E6F1FB; color: #185FA5; }
  .t-reptile { background: #EAF3DE; color: #3B6D11; }
  .t-amphibien { background: #E1F5EE; color: #0F6E56; }
  [data-theme="dark"] .t-mammifere { background: #2a1008; color: #f09970; }
  [data-theme="dark"] .t-oiseau { background: #0a1e33; color: #85b7eb; }
  [data-theme="dark"] .t-reptile { background: #0e1f06; color: #97c459; }
  [data-theme="dark"] .t-amphibien { background: #041f14; color: #5dcaa5; }

  /* TABS */
  .view-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .view-tab {
    padding: 6px 16px; border-radius: 20px; border: 0.5px solid var(--border-strong);
    background: transparent; font-size: 13px; cursor: pointer; color: var(--text-muted);
    transition: all .15s; font-weight: 500;
  }
  .view-tab:hover { background: var(--bg); }
  .view-tab.active { background: var(--green); border-color: var(--green); color: #fff; }
  .view { display: none; }
  .view.active { display: block; }

  /* MAP */
  .map-wrap {
    border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
    background: var(--surface);
  }
  #map { width: 100%; height: 480px; background: var(--bg); }
  .map-legend {
    display: flex; gap: 16px; padding: 10px 14px; border-top: 0.5px solid var(--border);
    font-size: 12px; color: var(--text-muted); flex-wrap: wrap; align-items: center;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: -1px; }
  .legend-dot.green { background: #1D9E75; }
  .legend-dot.yellow { background: #E8B400; }
  .map-hint { font-size: 12px; color: var(--text-hint); margin-top: 10px; text-align: center; }
  .map-banner {
    background: var(--green-light); color: var(--green-dark); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none; align-items: center;
    justify-content: space-between; gap: 10px;
  }
  [data-theme="dark"] .map-banner { color: #5dcaa5; }
  .map-banner.show { display: flex; }
  .map-banner button {
    border: none; background: var(--green); color: #fff; border-radius: 16px;
    padding: 4px 12px; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border-radius: 8px; }
  .leaflet-popup-tip { background: var(--surface); }
  .popup-pin-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .popup-pin-meta { font-size: 11px; color: var(--text-muted); }

  /* DATA TOOLS (export/import) */
  .data-tools { display: flex; gap: 8px; }
  .data-btn {
    padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border-strong);
    background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text-muted);
    transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
  }
  .data-btn:hover { background: var(--border); }
  #import-file-input { display: none; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .toast.show { opacity: 1; }

  /* MAP FILTERS */
  .map-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .map-filters select, .map-filters input[type="month"] {
    padding: 5px 10px; border-radius: 8px; border: 0.5px solid var(--border-strong);
    background: var(--surface); color: var(--text); font-size: 12px;
  }
  .map-filters select:focus, .map-filters input[type="month"]:focus { outline: none; border-color: var(--green); }
  .map-filter-clear {
    font-size: 12px; color: var(--text-hint); cursor: pointer; text-decoration: underline; background:none; border:none;
  }
  .map-count { font-size: 12px; color: var(--text-hint); margin-left: auto; }

  /* MODE ÉDITION (verrou) */
  .lock-btn {
    padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--border-strong);
    background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text-muted);
    transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
  }
  .lock-btn:hover { background: var(--border); }
  .lock-btn.unlocked { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
  .pin-modal { max-width: 320px; text-align: center; }
  .pin-input {
    width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong);
    background: var(--bg); color: var(--text); font-size: 16px; text-align: center; letter-spacing: 4px;
    margin: 14px 0; font-family: inherit;
  }
  .pin-input:focus { outline: none; border-color: var(--green); }
  .sync-status {
    font-size: 11px; color: var(--text-hint); display: flex; align-items: center; gap: 5px;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sync-dot.error { background: #E24B4A; }
  .sync-dot.syncing { background: #E8B400; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .readonly-notice {
    background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 12px; font-size: 12px; color: var(--text-hint); margin-bottom: 10px; text-align: center;
  }

  @media (max-width: 500px) {
    .app-header { padding: 0.75rem 1rem; }
    .header-inner { gap: 8px; }
    .header-right { width: 100%; justify-content: space-between; gap: 6px; }
    .data-tools { gap: 6px; }
    .data-btn, .theme-btn { padding: 5px 8px; font-size: 12px; }
    .stat-pill { font-size: 12px; padding: 4px 8px; }
    .main { padding: 0.75rem 1rem 3rem; }
    .view-tabs { gap: 6px; }
    .view-tab { padding: 6px 10px; font-size: 12px; flex: 1; text-align: center; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
    #map { height: 380px; }
    .map-filters { flex-direction: column; align-items: stretch; }
    .map-filters select, .map-filters input[type="month"] { width: 100%; }
    .map-count { margin-left: 0; text-align: right; }
    .modal { max-width: 100%; padding: 1.25rem; }
    .modal-name { font-size: 18px; }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body data-theme="light">

<header class="app-header">
  <div class="header-inner">
    <div class="app-title"><span>🐾</span> FauneDex — Côte-d'Or</div>
    <div class="header-right">
      <div class="sync-status" id="sync-status"><span class="sync-dot"></span><span id="sync-status-text">Synchronisé</span></div>
      <div class="stat-pill"><b id="count-cap">0</b> / <b id="count-tot">0</b> capturés</div>
      <div class="data-tools">
        <button class="data-btn" onclick="exportData()">⬇️ Exporter</button>
        <button class="data-btn" onclick="document.getElementById('import-file-input').click()">⬆️ Importer</button>
        <input type="file" id="import-file-input" accept="application/json" onchange="importData(this)" />
      </div>
      <button class="lock-btn" id="lock-btn" onclick="onLockButtonClick()">🔒 Lecture seule</button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙 Mode sombre</button>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
</div>

<main class="main">
  <div class="view-tabs">
    <button class="view-tab active" data-view="grid">📋 Collection</button>
    <button class="view-tab" data-view="season">☀️ Saisons</button>
    <button class="view-tab" data-view="map">🗺️ Carte des observations</button>
  </div>

  <div class="view active" id="view-grid">
    <div class="filters">
      <input class="search-input" type="text" id="search" placeholder="🔍 Rechercher..." />
      <button class="filter-btn active" data-f="all">Tous</button>
      <button class="filter-btn" data-f="Mammifère">Mammifères</button>
      <button class="filter-btn" data-f="Oiseau">Oiseaux</button>
      <button class="filter-btn" data-f="Reptile">Reptiles</button>
      <button class="filter-btn" data-f="Amphibien">Amphibiens</button>
      <button class="filter-btn" data-f="captured">✓ Capturés</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="view" id="view-season">
    <div class="season-section">
      <div class="season-header">
        <div class="season-title">☀️ À observer en <select id="season-month-select" aria-label="Choisir le mois"></select></div>
        <button class="season-today-btn" id="season-today-btn" onclick="resetToCurrentMonth()">Mois actuel</button>
      </div>
      <div class="season-grid" id="season-grid"></div>
    </div>
  </div>

  <div class="view" id="view-map">
    <div class="map-banner" id="map-banner">
      <span id="map-banner-text"></span>
      <button onclick="cancelPlacing()">Annuler</button>
    </div>
    <div class="map-filters">
      <select id="map-filter-type" aria-label="Filtrer par groupe">
        <option value="all">Tous les groupes</option>
        <option value="Mammifère">Mammifères</option>

async function sha256Hex(message){
  if(window.crypto && window.crypto.subtle){
    const enc = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', enc);

/* ───────────────────────── STOCKAGE SÉCURISÉ ─────────────────────────
   Sur certains navigateurs mobiles (Safari iOS en navigation privée,
   ouverture du fichier en file://, réglages de confidentialité stricts),
   l'accès à localStorage peut lever une exception. On enrobe tous les
   accès pour ne jamais planter le reste de l'application. Si le stockage
   est indisponible, on bascule en mémoire (les données ne survivront pas
   à la fermeture de la page, mais l'app reste utilisable). */
let storageAvailable = true;
const memoryStore = {};
const safeStorage = {
  get(key, fallback){
    try { const v = localStorage.getItem(key); return v === null ? fallback : v; }
    catch(e){ storageAvailable = false; return (key in memoryStore) ? memoryStore[key] : fallback; }
  },
  set(key, value){
    try { localStorage.setItem(key, value); }
    catch(e){ storageAvailable = false; memoryStore[key] = value; }
  }
};

let captures = {};
try { captures = JSON.parse(safeStorage.get('faune_cdo_v3', '{}')); } catch(e){ captures = {}; }
// Ce cache local s'affiche immédiatement ; il est remplacé dès que Supabase répond (voir loadFromSupabase).

function migrateIdsIfNeeded(){
  const migrationDone = safeStorage.get('faune_migration_v2_done', null);
  if(migrationDone === 'true') return;

  // Migrer captures
  const newCaptures = {};
  Object.keys(captures).forEach(oldId => {
    const newId = ID_MIGRATION_MAP[oldId];
    if(newId) newCaptures[newId] = captures[oldId];
  });
  captures = newCaptures;
  save();

  // Migrer sightings (tableau, donc on mute animalId directement)
  sightings.forEach(s => {
    const newId = ID_MIGRATION_MAP[String(s.animalId)];
    if(newId) s.animalId = newId;
  });
  saveSightings();

  safeStorage.set('faune_migration_v2_done', 'true');
}

// Theme
let theme = safeStorage.get('faune_theme', 'light');

function applyTheme(t) {
  theme = t;
  document.body.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = t === 'dark' ? '☀️ Mode clair' : '🌙 Mode sombre';
  safeStorage.set('faune_theme', t);
}
applyTheme(theme);
function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }

async function pushCaptureToSupabase(animalId){
  if(!supabaseClient) { setSyncStatus('error', 'Hors-ligne'); return; }
  setSyncStatus('syncing', 'Synchronisation…');
  const cap = captures[animalId];
  try {
    if(!cap){
      // Fiche réinitialisée → suppression côté serveur
      const { error } = await supabaseClient.from('captures').delete().eq('animal_id', animalId);
      if(error) throw error;
    } else {
      const { error } = await supabaseClient.from('captures').upsert({
        animal_id: animalId,
        date: cap.date || null,
        time: cap.time || null,
        lieu: cap.lieu || null,
        notes: cap.notes || null,
        photo: cap.photo || null,
        captured_at: cap.capturedAt || null
      });
      if(error) throw error;
    }
    setSyncStatus('ok', 'Synchronisé');
  } catch(e){
    console.error('Erreur sync capture:', e);
    setSyncStatus('error', 'Erreur de synchro');
  }
}

function updateStats(){
  const c = Object.keys(captures).length;
  const t = ANIMALS.length;
  document.getElementById("count-cap").textContent = c;
  document.getElementById("count-tot").textContent = t;
  document.getElementById("progress").style.width = (c/t*100).toFixed(1)+"%";
}

/* Renvoie l'ensemble des 10 premiers IDs capturés, par ordre chronologique.
   Les captures avec un horodatage système (capturedAt) sont triées dessus ;
   les anciennes captures sans cet horodatage (créées avant cette mise à jour)
   sont considérées plus anciennes et triées selon leur ordre d'insertion. */
function getFirstTenCapturedIds(){
  const entries = Object.keys(captures).map(id => ({
    id: Number(id),
    capturedAt: captures[id].capturedAt || 0 // 0 = ancienne capture, considérée antérieure
  }));
  entries.sort((a, b) => a.capturedAt - b.capturedAt);
  return new Set(entries.slice(0, 10).map(e => e.id));
}

/* ───────────────────────── MODE SAISON ─────────────────────────
   Chaque animal a un champ `months` (1=janvier...12=décembre) indiquant
   les mois où il est raisonnablement observable (migration, reproduction,
   période d'activité hors hibernation...). On peut choisir un mois
   différent du mois actuel pour planifier des sorties à l'avance. */
const MONTH_NAMES = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

function populateSeasonMonthSelect(){
  const sel = document.getElementById('season-month-select');
  if(!sel || sel.options.length) return; // déjà peuplé
  MONTH_NAMES.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.value = new Date().getMonth() + 1;
  sel.addEventListener('change', () => {
    updateSeasonTodayButtonVisibility();
    render();
    renderSeasonSection();
  });
}

function getSelectedSeasonMonth(){
  const sel = document.getElementById('season-month-select');
  return sel ? Number(sel.value) : (new Date().getMonth() + 1);
}

function resetToCurrentMonth(){
  const sel = document.getElementById('season-month-select');
  if(!sel) return;
  sel.value = new Date().getMonth() + 1;
  updateSeasonTodayButtonVisibility();
  render();
  renderSeasonSection();
}

function updateSeasonTodayButtonVisibility(){
  const btn = document.getElementById('season-today-btn');
  if(!btn) return;
  const isCurrent = getSelectedSeasonMonth() === (new Date().getMonth() + 1);
  btn.classList.toggle('is-current', isCurrent);
}

function renderSeasonSection(){
  const container = document.getElementById('season-grid');
  if(!container) return;
  const month = getSelectedSeasonMonth();
  // Priorité aux espèces non encore capturées, de saison ce mois-ci
  const candidates = ANIMALS.filter(a => a.months && a.months.includes(month) && !captures[a.id]);
  if(!candidates.length){
    container.innerHTML = '<div class="season-empty">Tu as déjà capturé toutes les espèces de saison ce mois-ci, bravo ! 🎉</div>';
    return;
  }
  container.innerHTML = candidates.map(a => `
    <div class="season-card-mini" onclick="openModal(${a.id})" tabindex="0" role="button" aria-label="${a.name}">
      <span class="emoji">${a.emoji}</span>
      <div class="name">${a.name}</div>
    </div>`).join('');
}

function filtered(){
  return ANIMALS.filter(a => {
    if(currentFilter === "captured" && !captures[a.id]) return false;
    if(currentFilter !== "all" && currentFilter !== "captured" && a.type !== currentFilter) return false;
    const q = searchText.toLowerCase();
    if(q && !a.name.toLowerCase().includes(q) && !a.latin.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render(){
  const list = filtered();
  const grid = document.getElementById("grid");
  if(!list.length){
    grid.innerHTML = '<div class="empty"><span class="empty-icon">🔍</span>Aucun animal trouvé</div>';
    updateStats(); renderSeasonSection(); return;
  }
  const firstTenIds = getFirstTenCapturedIds();
  const currentSeasonMonth = getSelectedSeasonMonth();
  grid.innerHTML = list.map(a => {
    const cap = captures[a.id];
    const isFirstTen = cap && firstTenIds.has(a.id);
    const isInSeason = a.months && a.months.includes(currentSeasonMonth);
    const img = cap && cap.photo
      ? `<img src="${cap.photo}" alt="${a.name}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
      : `<span class="card-emoji">${a.emoji}</span>`;
    return `<div class="card${cap?' captured':''}" onclick="openModal(${a.id})" tabindex="0" role="button" aria-label="${a.name}">
      ${isFirstTen?'<div class="first-badge" title="Première rencontre">🥇</div>':''}
      ${cap?'<div class="cap-dot"></div>':''}
      <div class="card-num">#${String(a.id).padStart(3,'0')}${isInSeason?'<span class="season-badge" title="De saison ce mois-ci">☀️</span>':''}</div>
      <div class="card-img">${img}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-type">${a.type}</div>
      ${cap?`<div class="card-date">📅 ${cap.date||''}${cap.time?` · ${cap.time}`:''}</div>`:''}
    </div>`;
  }).join('');
  updateStats();
  renderSeasonSection();
}

function openModal(id){
  const a = ANIMALS.find(x=>x.id===id);
  currentAnimal = a;
  currentPhoto = null;
  const cap = captures[id];
  const animalSightings = sightings.filter(s => s.animalId === id);
  const imgHtml = cap && cap.photo
    ? `<div class="modal-img" style="position:relative">
        <img src="${cap.photo}" alt="${a.name}">
        <label for="edit-photo-file" class="edit-photo-btn" title="Changer la photo">✏️</label>
        <input type="file" id="edit-photo-file" accept="image/*" onchange="handleEditPhoto(this, ${id})" style="display:none">
      </div>`
    : `<div class="modal-img">${a.emoji}</div>`;

  let sightingsListHtml = '';
  if(animalSightings.length){
    sightingsListHtml = `<div style="margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500">📍 Points sur la carte (${animalSightings.length})</div>
      ${animalSightings.map(s => `
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);padding:4px 0">
          <span><span class="legend-dot ${s.kind==='capture'?'green':'yellow'}"></span>${s.date}${s.time?` ${s.time}`:''}${s.lieu?' — '+s.lieu:''}</span>
          <button onclick="deleteSighting('${s.id}')" style="border:none;background:none;color:#E24B4A;cursor:pointer;font-size:11px;padding:2px 6px">✕</button>
        </div>`).join('')}
    </div>`;
  }

  const capSection = cap
    ? `<div class="capture-section">
        <div class="capture-done">✓ Capturé le ${cap.date}${cap.time?` à ${cap.time}`:''}${cap.lieu?' — '+cap.lieu:''}</div>
        ${cap.notes?`<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-style:italic">"${cap.notes}"</div>`:''}
        ${!cap.photo?`<label for="add-photo-file" class="data-btn" style="display:inline-flex;margin-bottom:10px;cursor:pointer">📷 Ajouter une photo</label><input type="file" id="add-photo-file" accept="image/*" onchange="handleEditPhoto(this, ${id})" style="display:none">`:''}
        <button class="btn-capture" style="background:#E8B400" onclick="startAddSighting(${id})">📍 Ajouter une observation (carte)</button>
        <button class="btn-release" onclick="releaseAnimal(${id})">↩ Réinitialiser cette fiche</button>
        ${sightingsListHtml}
      </div>`
    : `<div class="capture-section">
        <div class="capture-title">Marquer comme observé (1ère fois = capture)</div>
        <div class="photo-row">
          <label class="photo-label" for="photo-file">📷 Ajouter ma photo</label>
          <input type="file" id="photo-file" accept="image/*" onchange="handlePhoto(this)" style="display:none">
          <div id="photo-prev" class="photo-placeholder">📷</div>
        </div>
        <div class="input-row">
          <input type="date" id="cap-date" value="${new Date().toISOString().split('T')[0]}" aria-label="Date">
          <input type="time" id="cap-time" value="${new Date().toTimeString().slice(0,5)}" aria-label="Heure">
        </div>
        <div class="input-row">
          <input type="text" id="cap-lieu" placeholder="Lieu (optionnel)" aria-label="Lieu">
        </div>
        <input type="text" id="cap-notes" placeholder="Notes (comportement, météo…)" aria-label="Notes" class="notes-input">
        <button class="btn-capture" onclick="captureAnimal(${id})">🎯 Capturer !</button>
        <div class="map-hint" style="margin-top:8px">Tu pourras placer le point GPS juste après.</div>
      </div>`;
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-num">#${String(a.id).padStart(3,'0')}</div>
        <div class="modal-name">${a.name}</div>
        <div class="modal-latin">${a.latin}</div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
    </div>
    ${imgHtml}
    <span class="type-badge ${TYPE_CLASS[a.type]}">${a.type}</span>
    <div class="modal-desc">${a.desc}</div>
    <div class="modal-habitat">${a.habitat}</div>
    ${capSection}`;
  document.getElementById("modal-bg").classList.add("open");
}

function closeModal(){
  document.getElementById("modal-bg").classList.remove("open");
  currentAnimal = null;
  currentPhoto = null;
}

function handlePhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentPhoto = e.target.result;
    const prev = document.getElementById("photo-prev");
    if(prev) prev.innerHTML = `<img src="${currentPhoto}" class="photo-thumb" alt="Aperçu">`;
  };
  reader.readAsDataURL(file);
}

function handleEditPhoto(input, id){
  if(!requireEditMode()) { input.value=''; return; }
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    if(!captures[id]) return;
    captures[id].photo = e.target.result; // seule la photo change, le reste de la fiche est intact
    save();
    pushCaptureToSupabase(id);
    render();
    openModal(id); // recharge la fiche pour afficher la nouvelle photo
    showToast('✅ Photo mise à jour');
  };
  reader.readAsDataURL(file);
}

function captureAnimal(id){
  if(!requireEditMode()) return;
  const d = document.getElementById("cap-date")?.value || new Date().toISOString().split('T')[0];
  const [y,m,day] = d.split('-');
  const dateStr = `${day}/${m}/${y}`;
  const timeStr = document.getElementById("cap-time")?.value || "";
  const lieu = document.getElementById("cap-lieu")?.value || "";
  const notes = document.getElementById("cap-notes")?.value || "";
  captures[id] = { date: dateStr, time: timeStr, lieu, notes, photo: currentPhoto || null, capturedAt: Date.now() };
  save();
  pushCaptureToSupabase(id);
  closeModal();
  render();
  // Propose de placer le point de capture sur la carte
  pendingSighting = { animalId: id, kind: 'capture', date: dateStr, time: timeStr, lieu, notes };
  goToMapForPlacing();
}

function releaseAnimal(id){
  if(!requireEditMode()) return;
  if(!confirm("Supprimer cette fiche capturée ? Les points sur la carte associés seront aussi supprimés.")) return;
  delete captures[id];
  const removedSightingIds = sightings.filter(s => s.animalId === id).map(s => s.id);
  sightings = sightings.filter(s => s.animalId !== id);
  saveSightings();
  save();
  pushCaptureToSupabase(id); // capture absente -> déclenche une suppression côté serveur
  removedSightingIds.forEach(sid => deleteSightingFromSupabase(sid));
  closeModal();
  render();
  renderMapMarkers();
}

function startAddSighting(id){
  if(!requireEditMode()) return;
  const animal = ANIMALS.find(a => a.id === id);
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const timeStr = now.toTimeString().slice(0,5);
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-num">#${String(animal.id).padStart(3,'0')}</div>
        <div class="modal-name">${animal.name}</div>
        <div class="modal-latin">Nouvelle observation</div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
    </div>
    <div class="capture-section" style="border-top:none;padding-top:0">
      <div class="input-row">
        <input type="date" id="sight-date" value="${todayStr}" aria-label="Date">
        <input type="time" id="sight-time" value="${timeStr}" aria-label="Heure">
      </div>
      <div class="input-row">
        <input type="text" id="sight-lieu" placeholder="Lieu (optionnel)" aria-label="Lieu">
      </div>
      <input type="text" id="sight-notes" placeholder="Notes (comportement, météo…)" aria-label="Notes" class="notes-input">
      <button class="btn-capture" style="background:#E8B400" onclick="confirmAddSighting(${id})">📍 Placer sur la carte</button>
    </div>`;
}

function confirmAddSighting(id){
  const d = document.getElementById("sight-date")?.value || new Date().toISOString().split('T')[0];
  const [y,m,day] = d.split('-');
  const dateStr = `${day}/${m}/${y}`;
  const timeStr = document.getElementById("sight-time")?.value || "";
  const lieu = document.getElementById("sight-lieu")?.value || "";
  const notes = document.getElementById("sight-notes")?.value || "";
  pendingSighting = { animalId: id, kind: 'observation', date: dateStr, time: timeStr, lieu, notes };
  closeModal();
  goToMapForPlacing();
}

function deleteSighting(sightingId){
  if(!requireEditMode()) return;
  sightings = sightings.filter(s => s.id !== sightingId);
  saveSightings();
  deleteSightingFromSupabase(sightingId);
  renderMapMarkers();
  openModal(currentAnimal.id);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active","active-cap"));
    currentFilter = btn.dataset.f;
    btn.classList.add(currentFilter === "captured" ? "active-cap" : "active");
    render();

});

document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value;
  render();
});

document.getElementById("modal-bg").addEventListener("click", e => {

});

document.getElementById("grid").addEventListener("keydown", e => {

});

/* ───────────────────────── VIEW TABS ───────────────────────── */
document.querySelectorAll(".view-tab").forEach(tab => {
  tab.addEventListener("click", () => switchView(tab.dataset.view));
});

function switchView(viewName){
  document.querySelectorAll(".view-tab").forEach(t => t.classList.toggle("active", t.dataset.view === viewName));
  document.getElementById("view-grid").classList.toggle("active", viewName === "grid");
  document.getElementById("view-season").classList.toggle("active", viewName === "season");
  document.getElementById("view-map").classList.toggle("active", viewName === "map");
  if(viewName === "map"){
    setTimeout(() => { if(map) map.invalidateSize(); }, 50);
  }
  if(viewName === "season"){
    renderSeasonSection();
  }
}

/* ───────────────────────── MAP ───────────────────────── */
let map = null;
let markersLayer = null;
let pendingSighting = null; // {animalId, kind, date, lieu, notes}

function initMap(){
  if(typeof L === 'undefined'){
    // Leaflet n'a pas pu se charger (pas de réseau, CDN bloqué…)
    const mapEl = document.getElementById('map');
    if(mapEl) mapEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;color:var(--text-muted);font-size:13px">🗺️ La carte nécessite une connexion internet pour charger le fond de carte.<br>Réessaie avec une connexion active.</div>';
    return;
  }
  try {
    map = L.map('map', { scrollWheelZoom: true }).setView(VILLAGE_COORDS, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19
    }).addTo(map);
    L.marker(VILLAGE_COORDS, {
      icon: L.divIcon({ className: '', html: '<div style="font-size:22px">🏠</div>', iconSize:[22,22], iconAnchor:[11,11] })
    }).addTo(map).bindPopup("Marigny-le-Cahouët");

    markersLayer = L.layerGroup().addTo(map);

    map.on('click', (e) => {
      if(!pendingSighting) return;
      placePendingSightingAt(e.latlng.lat, e.latlng.lng);
    });

    renderMapMarkers();
  } catch(e){
    console.error('Erreur init carte:', e);
  }
}

function goToMapForPlacing(){
  switchView('map');
  const banner = document.getElementById('map-banner');
  const text = document.getElementById('map-banner-text');
  const animal = ANIMALS.find(a => a.id === pendingSighting.animalId);
  const kindLabel = pendingSighting.kind === 'capture' ? 'la capture' : "l'observation";
  text.textContent = `📍 Clique sur la carte pour placer ${kindLabel} de : ${animal.name}`;
  banner.classList.add('show');
  if(map) map.getContainer().style.cursor = 'crosshair';
}

function cancelPlacing(){
  pendingSighting = null;
  document.getElementById('map-banner').classList.remove('show');
  if(map) map.getContainer().style.cursor = '';
}

function placePendingSightingAt(lat, lng){
  const s = {
    id: 'sight_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    animalId: pendingSighting.animalId,
    kind: pendingSighting.kind,
    date: pendingSighting.date,
    time: pendingSighting.time || '',
    lieu: pendingSighting.lieu,
    notes: pendingSighting.notes,
    lat, lng
  };
  sightings.push(s);
  saveSightings();
  pushSightingToSupabase(s);
  cancelPlacing();
  renderMapMarkers();
}

function getMapFilters(){
  return {
    type: document.getElementById('map-filter-type')?.value || 'all',
    species: document.getElementById('map-filter-species')?.value || 'all',
    kind: document.getElementById('map-filter-kind')?.value || 'all',
    month: document.getElementById('map-filter-month')?.value || '' // format YYYY-MM
  };
}

function sightingMatchesFilters(s, f){
  const animal = ANIMALS.find(a => a.id === s.animalId);
  if(!animal) return false;
  if(f.type !== 'all' && animal.type !== f.type) return false;
  if(f.species !== 'all' && String(s.animalId) !== f.species) return false;
  if(f.kind !== 'all' && s.kind !== f.kind) return false;
  if(f.month){
    // s.date is DD/MM/YYYY, f.month is YYYY-MM
    const [day, mo, yr] = s.date.split('/');
    if(`${yr}-${mo}` !== f.month) return false;
  }
  return true;
}

function populateSpeciesFilter(){
  const sel = document.getElementById('map-filter-species');
  if(!sel) return;
  const usedAnimalIds = [...new Set(sightings.map(s => s.animalId))];
  const usedAnimals = ANIMALS.filter(a => usedAnimalIds.includes(a.id)).sort((a,b) => a.name.localeCompare(b.name));
  const currentVal = sel.value;
  sel.innerHTML = '<option value="all">Toutes les espèces</option>' +
    usedAnimals.map(a => `<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  if(usedAnimalIds.includes(Number(currentVal))) sel.value = currentVal;
}

function clearMapFilters(){
  document.getElementById('map-filter-type').value = 'all';
  document.getElementById('map-filter-species').value = 'all';
  document.getElementById('map-filter-kind').value = 'all';
  document.getElementById('map-filter-month').value = '';
  renderMapMarkers();
}

['map-filter-type','map-filter-species','map-filter-kind','map-filter-month'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', renderMapMarkers);
});

function renderMapMarkers(){
  if(!markersLayer) return;
  populateSpeciesFilter();
  const f = getMapFilters();
  markersLayer.clearLayers();
  let shown = 0;
  sightings.forEach(s => {
    if(!sightingMatchesFilters(s, f)) return;
    const animal = ANIMALS.find(a => a.id === s.animalId);
    if(!animal) return;
    shown++;
    const color = s.kind === 'capture' ? '#1D9E75' : '#E8B400';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
      iconSize: [16,16], iconAnchor: [8,8]
    });
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(markersLayer);
    marker.bindPopup(`
      <div class="popup-pin-title">${animal.emoji} ${animal.name}</div>
      <div class="popup-pin-meta">${s.kind === 'capture' ? '🟢 Capture' : '🟡 Observation'} — ${s.date}${s.time?` ${s.time}`:''}${s.lieu ? ' — '+s.lieu : ''}</div>
    `);
  });
  const countEl = document.getElementById('map-count');
  if(countEl) countEl.textContent = `${shown} / ${sightings.length} point${sightings.length>1?'s':''} affiché${shown>1?'s':''}`;
}

function loadSightings(){
  try { sightings = JSON.parse(safeStorage.get('faune_sightings_v1', '[]')); } catch(e){ sightings = []; }
}
function saveSightings(){ safeStorage.set('faune_sightings_v1', JSON.stringify(sightings)); }

// Ajoute UN sighting dans Supabase
async function pushSightingToSupabase(sighting){
  if(!supabaseClient) { setSyncStatus('error', 'Hors-ligne'); return; }
  setSyncStatus('syncing', 'Synchronisation…');
  try {
    const { error } = await supabaseClient.from('sightings').upsert({
      id: sighting.id,
      animal_id: sighting.animalId,
      kind: sighting.kind,
      date: sighting.date || null,
      time: sighting.time || null,
      lieu: sighting.lieu || null,
      notes: sighting.notes || null,
      lat: sighting.lat,
      lng: sighting.lng
    });
    if(error) throw error;
    setSyncStatus('ok', 'Synchronisé');
  } catch(e){
    console.error('Erreur sync sighting:', e);
    setSyncStatus('error', 'Erreur de synchro');
  }
}

// Supprime UN sighting de Supabase
async function deleteSightingFromSupabase(sightingId){
  if(!supabaseClient) { setSyncStatus('error', 'Hors-ligne'); return; }
  setSyncStatus('syncing', 'Synchronisation…');
  try {
    const { error } = await supabaseClient.from('sightings').delete().eq('id', sightingId);
    if(error) throw error;
    setSyncStatus('ok', 'Synchronisé');
  } catch(e){
    console.error('Erreur suppression sighting:', e);
    setSyncStatus('error', 'Erreur de synchro');
  }
}

let sightings = [];
loadSightings();

/* ───────────────────────── CHARGEMENT DEPUIS SUPABASE ─────────────────────────
   Au démarrage, on récupère l'état réel partagé depuis la base. Le cache local
   (affiché en attendant) est alors remplacé par les données serveur, qui sont
   la source de vérité pour tout le monde. */
async function loadFromSupabase(){
  if(!supabaseClient) { setSyncStatus('error', 'Hors-ligne — données locales uniquement'); return; }
  setSyncStatus('syncing', 'Chargement…');
  try {
    const [capRes, sightRes] = await Promise.all([
      supabaseClient.from('captures').select('*'),
      supabaseClient.from('sightings').select('*')
    ]);
    if(capRes.error) throw capRes.error;
    if(sightRes.error) throw sightRes.error;

    const newCaptures = {};
    (capRes.data || []).forEach(row => {
      newCaptures[row.animal_id] = {
        date: row.date, time: row.time, lieu: row.lieu, notes: row.notes,
        photo: row.photo, capturedAt: row.captured_at
      };
    });
    captures = newCaptures;
    save();

    sightings = (sightRes.data || []).map(row => ({
      id: row.id, animalId: row.animal_id, kind: row.kind, date: row.date,
      time: row.time, lieu: row.lieu, notes: row.notes, lat: row.lat, lng: row.lng
    }));
    saveSightings();

    setSyncStatus('ok', 'Synchronisé');
    render();
    renderMapMarkers();
  } catch(e){
    console.error('Erreur chargement Supabase:', e);
    setSyncStatus('error', 'Erreur de connexion — données locales affichées');
  }
}

/* ───────────────────────── MODE ÉDITION (verrou par code) ─────────────────────────
   Tout le monde peut consulter FauneDex via le lien. Seule la personne qui
   connaît le code secret peut ajouter ou modifier des captures/observations.
   Le code n'est jamais stocké en clair : on vérifie son empreinte SHA-256. */
function isEditUnlocked(){
  return editModeUnlocked === true;
}

function requireEditMode(){
  if(isEditUnlocked()) return true;
  openUnlockModal();
  return false;
}

function updateLockButton(){
  const btn = document.getElementById('lock-btn');
  if(!btn) return;
  if(isEditUnlocked()){
    btn.textContent = '🔓 Mode édition';
    btn.classList.add('unlocked');
  } else {
    btn.textContent = '🔒 Lecture seule';
    btn.classList.remove('unlocked');
  }
}

function onLockButtonClick(){
  if(isEditUnlocked()){
    // Permet de reverrouiller manuellement (utile sur un appareil partagé)
    if(confirm("Repasser en lecture seule sur cet appareil ?")){
      editModeUnlocked = false;
      safeStorage.set('faune_edit_unlocked', 'false');
      updateLockButton();
      showToast('🔒 Repassé en lecture seule');
    }
  } else {
    openUnlockModal();
  }
}

function openUnlockModal(){
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-head">
      <div><div class="modal-name">🔒 Mode édition</div></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
    </div>
    <div class="pin-modal">
      <div class="modal-desc">Entre le code secret pour pouvoir ajouter ou modifier des captures sur cet appareil.</div>
      <input type="password" id="unlock-pin" class="pin-input" maxlength="8" inputmode="numeric" placeholder="••••" autofocus>
      <button class="btn-capture" onclick="tryUnlock()">Déverrouiller</button>
    </div>`;
  document.getElementById("modal-bg").classList.add("open");
  setTimeout(() => document.getElementById('unlock-pin')?.focus(), 50);
  document.getElementById('unlock-pin')?.addEventListener('keydown', e => {
    if(e.key === 'Enter') tryUnlock();
  });
}

async function tryUnlock(){
  const input = document.getElementById('unlock-pin');
  const code = input?.value || '';
  const hash = await sha256Hex(code);
  if(hash === EDIT_CODE_HASH || hash === EDIT_CODE_HASH_FALLBACK){
    editModeUnlocked = true;
    safeStorage.set('faune_edit_unlocked', 'true');
    updateLockButton();
    closeModal();
    showToast('🔓 Mode édition activé');
  } else {
    input.style.borderColor = '#E24B4A';
    input.value = '';
    input.placeholder = 'Code incorrect';
    setTimeout(() => { input.style.borderColor = ''; input.placeholder = '••••'; }, 1500);
  }
}

/* ───────────────────────── EXPORT / IMPORT ───────────────────────── */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function exportData(){
  const payload = {
    appName: "FauneDex — Côte-d'Or",
    exportVersion: 1,
    exportedAt: new Date().toISOString(),
    captures,
    sightings
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateTag = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `faune-cote-dor-sauvegarde-${dateTag}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Sauvegarde téléchargée');
}

function importData(input){
  if(!requireEditMode()) { input.value=''; return; }
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    let data;
    try { data = JSON.parse(e.target.result); }
    catch(err){ showToast('❌ Fichier invalide'); input.value=''; return; }

    if(!data || (typeof data.captures !== 'object') || !Array.isArray(data.sightings)){
      showToast('❌ Format de fichier non reconnu');
      input.value = '';
      return;
    }

    const incomingCapCount = Object.keys(data.captures).length;
    const incomingSightCount = data.sightings.length;
    const currentCapCount = Object.keys(captures).length;
    const currentSightCount = sightings.length;

    const mode = confirm(
      `Le fichier contient ${incomingCapCount} capture(s) et ${incomingSightCount} point(s) carte.\n` +
      `Tu en as actuellement ${currentCapCount} et ${currentSightCount}.\n\n` +
      `OK = FUSIONNER avec tes données actuelles\nAnnuler = REMPLACER tes données actuelles par celles du fichier`
    );

    if(mode){
      // Fusion : on garde l'existant, on ajoute ce qui manque
      Object.keys(data.captures).forEach(id => {
        if(!captures[id]) captures[id] = data.captures[id];
      });
      const existingIds = new Set(sightings.map(s => s.id));
      data.sightings.forEach(s => {
        if(!existingIds.has(s.id)) sightings.push(s);
      });
    } else {
      // Remplacement total
      captures = data.captures;
      sightings = data.sightings;
    }

    save();
    saveSightings();
    render();
    renderMapMarkers();
    input.value = '';
    showToast('⏳ Envoi vers la base partagée…');

    // Pousse tout vers Supabase (l'import doit aussi peupler la base partagée)
    setSyncStatus('syncing', 'Import en cours…');
    try {
      for(const id of Object.keys(captures)){
        await pushCaptureToSupabase(Number(id));
      }
      for(const s of sightings){
        await pushSightingToSupabase(s);
      }
      setSyncStatus('ok', 'Synchronisé');
      showToast(mode ? '✅ Données fusionnées et synchronisées' : '✅ Données remplacées et synchronisées');
    } catch(err){
      console.error('Erreur import vers Supabase:', err);
      setSyncStatus('error', 'Erreur de synchro');
      showToast('⚠️ Import local OK, mais erreur de synchro avec la base partagée');
    }
  };
  reader.readAsText(file);
}

migrateIdsIfNeeded();
editModeUnlocked = safeStorage.get('faune_edit_unlocked', 'false') === 'true';
updateLockButton();
populateSeasonMonthSelect();
updateSeasonTodayButtonVisibility();
render();
initMap();
loadFromSupabase();
</script>
